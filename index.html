.staff-btn:hover,.staff-btn:active { background:rgba(233,69,96,0.2); border-color:#e94560; transform:scale(1.02); }

.staff-name { font-weight:600; }

.admin-link { margin-top:20px; color:#e94560; font-size:14px; cursor:pointer; text-decoration:underline; }
.dashboard { min-height:100vh; padding:0; }
.dash-header { background:linear-gradient(135deg,#e94560,#c23152); padding:25px 20px 20px; border-radius:0 0 24px 24px; position:relative; }
.dash-hello { font-size:14px; color:rgba(255,255,255,0.8); }

.dash-logout { position:absolute; top:25px; right:20px; background:rgba(255,255,255,0.2); border:none; color:#fff; padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
.dash-status { margin:20px; padding:20px; background:rgba(255,255,255,0.06); border-radius:16px; text-align:center; }

.btn-checkin { background:linear-gradient(135deg,#00b894,#00cec9); color:#fff; }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }

.pin-input:focus { outline:none; border-color:#e94560; }

.admin-page { min-height:100vh; padding:20px; }
.admin-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.admin-back { background:rgba(255,255,255,0.1); border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:18px; cursor:pointer; }
.admin-header h2 { font-size:20px; color:#e94560; }
.month-selector { display:flex; align-items:center; gap:10px; margin-bottom:20px; justify-content:center; }
.month-selector button { background:rgba(255,255,255,0.1); border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:16px; cursor:pointer; }

.report-table { width:100%; border-collapse:collapse; font-size:13px; background:rgba(255,255,255,0.04); border-radius:12px; overflow:hidden; }
.report-table th { background:rgba(233,69,96,0.3); padding:10px 8px; text-align:left; font-size:12px; color:#e94560; }
.report-table td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
.report-table tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; }
.badge-ok { background:rgba(0,184,148,0.2); color:#00b894; }
.badge-late { background:rgba(253,203,110,0.2); color:#fdcb6e; }
.badge-absent { background:rgba(233,69,96,0.2); color:#e94560; }
.badge-excuse { background:rgba(116,185,255,0.2); color:#74b9ff; }
.top3-section { margin:20px 0; }
.top3-card { display:flex; align-items:center; gap:12px; padding:14px; margin-bottom:8px; background:rgba(255,255,255,0.06); border-radius:12px; }
.top3-rank { font-size:28px; }
.top3-info { flex:1; }
.top3-name { font-weight:700; font-size:15px; }
.top3-score { font-size:13px; color:#00b894; }
.summary-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.summary-card { background:rgba(255,255,255,0.06); border-radius:12px; padding:14px; text-align:center; }
.summary-card .num { font-size:28px; font-weight:700; color:#e94560; }
.summary-card .label { font-size:12px; color:#999; margin-top:4px; }
.congrats-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
.congrats-card { background:linear-gradient(135deg,#1e2a3a,#16213e); border:2px solid #e94560; border-radius:24px; padding:30px; text-align:center; max-width:350px; width:100%; animation:popIn 0.5s ease; }
@keyframes popIn { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
.congrats-card .trophy { font-size:64px; margin-bottom:10px; }
.congrats-card h2 { color:#e94560; font-size:22px; margin-bottom:8px; }
.congrats-card p { color:#ccc; font-size:14px; line-height:1.5; margin-bottom:15px; }
.congrats-card button { background:#e94560; border:none; color:#fff; padding:12px 30px; border-radius:10px; font-size:16px; cursor:pointer; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); padding:14px 24px; border-radius:12px; font-size:14px; font-weight:600; z-index:300; animation:slideUp 0.3s ease; max-width:90%; text-align:center; }
@keyframes slideUp { 0%{opacity:0;transform:translateX(-50%) translateY(20px)} 100%{opacity:1;transform:translateX(-50%) translateY(0)} }
.toast-success { background:#00b894; color:#fff; }
.toast-error { background:#e94560; color:#fff; }
.toast-info { background:#0984e3; color:#fff; }
.gps-loading { display:flex; flex-direction:column; align-items:center; gap:10px; padding:30px; }
.gps-spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.1); border-top-color:#e94560; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>

<body>

  <div class="login-logo">🏭</div>

<script>
var FACTORY_LAT = 36.329284;
var FACTORY_LNG = 30.331934;
var MAX_DISTANCE_M = 100;
var WORK_START = '08:30';
var WORK_END_FULL = '18:00';
var WORK_END_HALF = '12:00';
var OVERTIME_START_FULL = '18:15';
var OVERTIME_START_HALF = '12:15';
var ADMIN_PASS = 'ibiza2024';
var HALF_SAT_REF = new Date(2026, 3, 18);

var STAFF = [
  { id: 'P001', name: 'Yasin IBZE', pin: '3847' },
  { id: 'P002', name: 'Fatih IBZE', pin: '6219' },
  { id: 'P003', name: 'Nuri IBZE', pin: '5083' },
  { id: 'P004', name: 'Emre Erdogan', pin: '7461' },
  { id: 'P005', name: 'Emine Erdogan', pin: '2938' },
  { id: 'P006', name: 'Merve Guven', pin: '8154' },
  { id: 'P007', name: 'Emre Ozyer', pin: '4672' },
  { id: 'P008', name: 'Ferit Iflazoglu', pin: '9305' },
  { id: 'P009', name: 'Ibrahim Ozgur Gungor', pin: '1746' },
  { id: 'P010', name: 'Kadir Amac', pin: '5829' },
  { id: 'P011', name: 'Aysegul Sen', pin: '3061' },
  { id: 'P012', name: 'Senbir Gungor', pin: '7493' },
  { id: 'P013', name: 'Ali Al Musehhid', pin: '2517' },
  { id: 'P014', name: 'Yahya Al Bahaya', pin: '8640' }
];

var MONTHS_TR = ['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];
var DAYS_TR = ['Pazar','Pazartesi','Sali','Carsamba','Persembe','Cuma','Cumartesi'];

var currentUser = null;
var pendingUser = null;
var adminMonth = new Date().getMonth();
var adminYear = new Date().getFullYear();

function isHalfSaturday(year, month, day) {
  var d = new Date(year, month, day);
  if (d.getDay() !== 6) return false;
  var diff = Math.round((d - HALF_SAT_REF) / (7 * 24 * 60 * 60 * 1000));
  return diff % 2 === 0;
}

function getWorkEnd(year, month, day) {
  var d = new Date(year, month, day);
  if (d.getDay() === 6 && isHalfSaturday(year, month, day)) return WORK_END_HALF;
  return WORK_END_FULL;
}

function getOvertimeStart(year, month, day) {
  var d = new Date(year, month, day);
  if (d.getDay() === 6 && isHalfSaturday(year, month, day)) return OVERTIME_START_HALF;
  return OVERTIME_START_FULL;
}

function isWorkDay(year, month, day) {
  var dow = new Date(year, month, day).getDay();
  return dow !== 0;
}

function timeToMin(t) { var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }

function calcOvertime(checkout, year, month, day) {
  var otStart = getOvertimeStart(year, month, day);
  var checkMin = timeToMin(checkout);
  var otMin = timeToMin(otStart);
  if (checkMin <= otMin) return 0;
  return checkMin - otMin;
}

function formatMin(m) {
  if (m <= 0) return '-';
  var h = Math.floor(m / 60);
  var min = m % 60;
  if (h > 0) return h + 's ' + min + 'dk';
  return min + 'dk';
}

function getData() { return JSON.parse(localStorage.getItem('ibiza_attendance') || '{}'); }
function saveData(data) { localStorage.setItem('ibiza_attendance', JSON.stringify(data)); }
function todayKey() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function nowTime() { var d = new Date(); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function getRecord(userId, date) { var data = getData(); return data[userId]?.[date] || null; }
function setRecord(userId, date, record) { var data = getData(); if (!data[userId]) data[userId] = {}; data[userId][date] = record; saveData(data); }

function getDistance(lat1, lon1, lat2, lon2) {
  var R = 6371e3;
  var toRad = function(x) { return x * Math.PI / 180; };
  var dLat = toRad(lat2 - lat1);
  var dLon = toRad(lon2 - lon1);
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function checkGPS() {
  return new Promise(function(resolve, reject) {
    if (!navigator.geolocation) { reject('Konum servisi desteklenmiyor.'); return; }
    document.getElementById('gpsLoading').classList.remove('hidden');
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        document.getElementById('gpsLoading').classList.add('hidden');
        var dist = getDistance(pos.coords.latitude, pos.coords.longitude, FACTORY_LAT, FACTORY_LNG);
        if (dist <= MAX_DISTANCE_M) { resolve(Math.round(dist)); }
        else { reject('Fabrikaya uzakliginiz ' + Math.round(dist) + ' metre. En fazla ' + MAX_DISTANCE_M + ' metre uzaklikta olmalisiniz.'); }
      },
      function(err) {
        document.getElementById('gpsLoading').classList.add('hidden');
        if (err.code === 1) reject('Konum izni reddedildi. Lutfen konum iznini acin.');
        else if (err.code === 2) reject('Konum bilgisi alinamadi.');
        else reject('Konum alinamadi. Zaman asimi.');
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

function showToast(msg, type) {
  if (!type) type = 'success';
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

function renderLogin() {
  var list = document.getElementById('staffList');
  var html = '';
  for (var i = 0; i < STAFF.length; i++) {
    html += '<button class="staff-btn" onclick="selectUser(\'' + STAFF[i].id + '\')"><div class="staff-avatar">' + STAFF[i].name.charAt(0) + '</div><div><div class="staff-name">' + STAFF[i].name + '</div><div class="staff-id">' + STAFF[i].id + '</div></div></button>';
  }
  list.innerHTML = html;
}

function selectUser(userId) {
  pendingUser = STAFF.find(function(s) { return s.id === userId; });
  if (!pendingUser) return;
  document.getElementById('pinName').textContent = pendingUser.name;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').classList.add('hidden');
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('pinPage').classList.remove('hidden');
  document.getElementById('pinInput').focus();
}

function verifyPin() {
  var pin = document.getElementById('pinInput').value;
  if (pin === pendingUser.pin) {
    currentUser = pendingUser;
    pendingUser = null;
    localStorage.setItem('ibiza_current_user', currentUser.id);
    document.getElementById('pinPage').classList.add('hidden');
    showDashboard();
  } else {
    document.getElementById('pinError').classList.remove('hidden');
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function cancelPin() {
  pendingUser = null;
  document.getElementById('pinPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

function showAdminLogin() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('adminLoginPage').classList.remove('hidden');
  document.getElementById('adminPassInput').value = '';
  document.getElementById('adminPassError').classList.add('hidden');
  document.getElementById('adminPassInput').focus();
}

function verifyAdminPass() {
  if (document.getElementById('adminPassInput').value === ADMIN_PASS) {
    document.getElementById('adminLoginPage').classList.add('hidden');
    showAdmin();
  } else {
    document.getElementById('adminPassError').classList.remove('hidden');
    document.getElementById('adminPassInput').value = '';
    document.getElementById('adminPassInput').focus();
  }
}

function cancelAdminLogin() {
  document.getElementById('adminLoginPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

function logout() {
  currentUser = null;
  localStorage.removeItem('ibiza_current_user');
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

function autoLogin() {
  var saved = localStorage.getItem('ibiza_current_user');
  if (saved) {
    currentUser = STAFF.find(function(s) { return s.id === saved; });
    if (currentUser) { showDashboard(); return; }
  }
  document.getElementById('loginPage').classList.remove('hidden');
}

function showDashboard() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('adminPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.remove('hidden');
  document.getElementById('dashName').textContent = currentUser.name;
  var now = new Date();
  document.getElementById('dashDate').textContent = now.getDate() + ' ' + MONTHS_TR[now.getMonth()] + ' ' + now.getFullYear() + ', ' + DAYS_TR[now.getDay()];
  var wEnd = getWorkEnd(now.getFullYear(), now.getMonth(), now.getDate());
  var dayType = (now.getDay() === 6 && isHalfSaturday(now.getFullYear(), now.getMonth(), now.getDate())) ? 'Yarim gun (12:00)' : 'Tam gun (18:00)';
  document.getElementById('workInfo').textContent = 'Bugun: ' + dayType + ' | Cikis: ' + wEnd;
  updateDashStatus();
  checkMonthEndCongrats();
}

function updateDashStatus() {
  var record = getRecord(currentUser.id, todayKey());
  var statusIcon = document.getElementById('statusIcon');
  var statusText = document.getElementById('statusText');
  var statusTime = document.getElementById('statusTime');
  var actionDiv = document.getElementById('actionButtons');

  if (!record) {
    statusIcon.textContent = '⏰';
    statusText.textContent = 'Henuz giris yapilmadi';
    statusTime.textContent = '';
    actionDiv.innerHTML = '<button class="btn-giris btn-checkin" onclick="doCheckin()">👋 GIRIS YAP</button><button class="btn-mazeret" onclick="openMazeret()">📋 Mazeret Bildir (Bugun Gelemiyorum)</button>';
  } else if (record.type === 'mazeret') {
    statusIcon.textContent = '📋';
    statusText.textContent = 'Mazeret: ' + record.reason;
    statusTime.textContent = '';
    actionDiv.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">Bugun icin mazeret bildirildi.</div>';
  } else if (record.checkin && !record.checkout) {
    statusIcon.textContent = '✅';
    statusText.textContent = 'Giris yapildi';
    statusTime.textContent = record.checkin;
    actionDiv.innerHTML = '<button class="btn-giris btn-checkout" onclick="doCheckout()">👋 CIKIS YAP</button>';
  } else if (record.checkin && record.checkout) {
    statusIcon.textContent = '🏠';
    statusText.textContent = 'Giris: ' + record.checkin + ' → Cikis: ' + record.checkout;
    var diff = timeToMin(record.checkout) - timeToMin(record.checkin);
    statusTime.textContent = Math.floor(diff / 60) + ' saat ' + (diff % 60) + ' dk';
    actionDiv.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">Bugunku mesainiz tamamlandi. Iyi aksamlar! 🌙</div>';
  }
}
async function doCheckin() {
  try {
    var dist = await checkGPS();
    var time = nowTime();
    var now = new Date();
    var record = { checkin: time, checkout: null, distance: dist };
    if (time > WORK_START) record.late = true;
    setRecord(currentUser.id, todayKey(), record);
    updateDashStatus();
    showToast('Giris kaydedildi: ' + time + ' ✓');
  } catch (err) { showToast(err, 'error'); }
}

async function doCheckout() {
  try {
    var dist = await checkGPS();
    var time = nowTime();
    var now = new Date();
    var record = getRecord(currentUser.id, todayKey());
    record.checkout = time;
    record.checkoutDistance = dist;
    var wEnd = getWorkEnd(now.getFullYear(), now.getMonth(), now.getDate());
    if (time < wEnd) record.earlyLeave = true;
    var ot = calcOvertime(time, now.getFullYear(), now.getMonth(), now.getDate());
    if (ot > 0) record.overtime = ot;
    setRecord(currentUser.id, todayKey(), record);
    updateDashStatus();
    var msg = 'Cikis kaydedildi: ' + time + ' ✓';
    if (ot > 0) msg += ' (Mesai: ' + formatMin(ot) + ')';
    showToast(msg);
  } catch (err) { showToast(err, 'error'); }
}

function openMazeret() { document.getElementById('mazeretModal').classList.remove('hidden'); }
function closeMazeret() { document.getElementById('mazeretModal').classList.add('hidden'); document.getElementById('mazeretNote').value = ''; }
function submitMazeret(reason) {
  var note = document.getElementById('mazeretNote').value.trim();
  setRecord(currentUser.id, todayKey(), { type: 'mazeret', reason: reason, note: note, time: nowTime() });
  closeMazeret();
  updateDashStatus();
  showToast('Mazeret bildirildi: ' + reason);
}

function showAdmin() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('adminPage').classList.remove('hidden');
  adminMonth = new Date().getMonth();
  adminYear = new Date().getFullYear();
  renderAdmin();
}
function hideAdmin() {
  document.getElementById('adminPage').classList.add('hidden');
  if (currentUser) { document.getElementById('dashboardPage').classList.remove('hidden'); }
  else { document.getElementById('loginPage').classList.remove('hidden'); }
}
function changeMonth(dir) {
  adminMonth += dir;
  if (adminMonth < 0) { adminMonth = 11; adminYear--; }
  if (adminMonth > 11) { adminMonth = 0; adminYear++; }
  renderAdmin();
}

function renderAdmin() {
  document.getElementById('monthLabel').textContent = MONTHS_TR[adminMonth] + ' ' + adminYear;
  var data = getData();
  var daysInMonth = new Date(adminYear, adminMonth + 1, 0).getDate();
  var totalWorked = 0, totalLate = 0, totalAbsent = 0, totalExcuse = 0, totalOvertime = 0;
  var scores = [];

  STAFF.forEach(function(s) {
    var worked = 0, late = 0, absent = 0, excuse = 0, overtime = 0;
    for (var d = 1; d <= daysInMonth; d++) {
      var date = adminYear + '-' + String(adminMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      if (!isWorkDay(adminYear, adminMonth, d)) continue;
      var rec = data[s.id]?.[date];
      if (!rec) { if (new Date(adminYear, adminMonth, d) <= new Date()) absent++; }
      else if (rec.type === 'mazeret') { excuse++; }
      else if (rec.checkin) { worked++; if (rec.late) late++; if (rec.overtime) overtime += rec.overtime; }
    }
    totalWorked += worked; totalLate += late; totalAbsent += absent; totalExcuse += excuse; totalOvertime += overtime;
    scores.push({ id: s.id, name: s.name, worked: worked, late: late, absent: absent, excuse: excuse, overtime: overtime, score: worked * 10 - late * 2 - absent * 5 });
  });

  document.getElementById('summaryCards').innerHTML = '<div class="summary-card"><div class="num">' + totalWorked + '</div><div class="label">Toplam Ise Gelis</div></div><div class="summary-card"><div class="num" style="color:#fdcb6e">' + totalLate + '</div><div class="label">Gec Kalma</div></div><div class="summary-card"><div class="num" style="color:#e94560">' + totalAbsent + '</div><div class="label">Devamsizlik</div></div><div class="summary-card"><div class="num" style="color:#74b9ff">' + totalExcuse + '</div><div class="label">Mazeretli</div></div>';

  scores.sort(function(a, b) { return b.score - a.score; });
  var trophies = ['🥇', '🥈', '🥉'];
  var top3Html = '<h3 style="margin-bottom:12px;color:#e94560;">🏆 En Iyi Puantaj</h3>';
  for (var i = 0; i < 3 && i < scores.length; i++) {
    top3Html += '<div class="top3-card"><div class="top3-rank">' + trophies[i] + '</div><div class="top3-info"><div class="top3-name">' + scores[i].name + '</div><div class="top3-score">' + scores[i].worked + ' gun · ' + scores[i].late + ' gec · Mesai: ' + formatMin(scores[i].overtime) + ' · Puan: ' + scores[i].score + '</div></div></div>';
  }
  document.getElementById('top3Section').innerHTML = top3Html;

  var tableHtml = '<thead><tr><th>Personel</th><th>Calisma</th><th>Gec</th><th>Devamsiz</th><th>Mazeret</th><th>Mesai</th><th>Puan</th></tr></thead><tbody>';
  scores.forEach(function(s) {
    var sc = s.score >= 0 ? '#00b894' : '#e94560';
    tableHtml += '<tr><td><strong>' + s.name + '</strong><br><small style="color:#999">' + s.id + '</small></td><td><span class="badge badge-ok">' + s.worked + ' gun</span></td><td><span class="badge badge-late">' + s.late + '</span></td><td><span class="badge badge-absent">' + s.absent + '</span></td><td><span class="badge badge-excuse">' + s.excuse + '</span></td><td><span class="badge" style="background:rgba(253,121,168,0.2);color:#fd79a8;">' + formatMin(s.overtime) + '</span></td><td><strong style="color:' + sc + '">' + s.score + '</strong></td></tr>';
  });
  document.getElementById('reportTable').innerHTML = tableHtml + '</tbody>';
}

function checkMonthEndCongrats() {
  var now = new Date();
  var lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  if (now.getDate() < lastDay - 1 && now.getDate() !== 1) return;
  var congratsKey = 'ibiza_congrats_' + now.getFullYear() + '_' + now.getMonth() + '_' + currentUser.id;
  if (localStorage.getItem(congratsKey)) return;
  var data = getData();
  var checkMonth = now.getDate() === 1 ? now.getMonth() - 1 : now.getMonth();
  var checkYear = (now.getDate() === 1 && checkMonth < 0) ? now.getFullYear() - 1 : now.getFullYear();
  var actualMonth = checkMonth < 0 ? 11 : checkMonth;
  var daysInMonth = new Date(checkYear, actualMonth + 1, 0).getDate();
  var scores = STAFF.map(function(s) {
    var worked = 0, late = 0;
    for (var d = 1; d <= daysInMonth; d++) {
      var date = checkYear + '-' + String(actualMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      if (!isWorkDay(checkYear, actualMonth, d)) continue;
      var rec = data[s.id]?.[date];
      if (rec && rec.type !== 'mazeret' && rec.checkin) { worked++; if (rec.late) late++; }
    }
    return { id: s.id, score: worked * 10 - late * 2 };
  });
  scores.sort(function(a, b) { return b.score - a.score; });
  var rank = scores.findIndex(function(s) { return s.id === currentUser.id; });
  if (rank < 3 && rank >= 0) {
    var trophies = ['🥇', '🥈', '🥉'];
    var titles = ['BIRINCISI', 'IKINCISI', 'UCUNCUSU'];
    var msgs = [
      'Tebrikler ' + currentUser.name + '! ' + MONTHS_TR[actualMonth] + ' ayinda EN YUKSEK puantajla birinci oldunuz!',
      'Tebrikler ' + currentUser.name + '! ' + MONTHS_TR[actualMonth] + ' ayinda ikinci en iyi puantaja sahipsiniz!',
      'Tebrikler ' + currentUser.name + '! ' + MONTHS_TR[actualMonth] + ' ayinda ucuncu en iyi puantaja sahipsiniz!'
    ];
    document.getElementById('congratsTrophy').textContent = trophies[rank];
    document.getElementById('congratsTitle').textContent = 'AYIN ' + titles[rank] + '! 🎉';
    document.getElementById('congratsText').textContent = msgs[rank];
    document.getElementById('congratsOverlay').classList.remove('hidden');
    localStorage.setItem(congratsKey, 'shown');
  }
}

function closeCongrats() { document.getElementById('congratsOverlay').classList.add('hidden'); }

document.getElementById('pinInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') verifyPin(); });
document.getElementById('adminPassInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') verifyAdminPass(); });

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

renderLogin();
autoLogin();
